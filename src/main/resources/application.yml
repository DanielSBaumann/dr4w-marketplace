spring:
  application:
    name: dr4w-marketplace
  threads:
    virtual:
      enabled: true  # Java 21 Virtual Threads
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketplace}
    username: ${DB_USER:marketplace}
    password: ${DB_PASSWORD:marketplace}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

marketplace:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-minimum-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}        # 15 minutes
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7 days
  platform:
    fee-percentage: ${PLATFORM_FEE_PERCENTAGE:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    io.dr4w.marketplace: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
