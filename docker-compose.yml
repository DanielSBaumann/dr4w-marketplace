services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: marketplace-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: marketplace
      DB_USER: marketplace
      DB_PASSWORD: marketplace
      JWT_SECRET: change-this-in-production-use-env-secret
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  postgres_data:
